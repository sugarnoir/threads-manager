appId: com.threadsmanager.app
productName: ThreadsManager
artifactName: ThreadsManager-${version}.dmg
copyright: Copyright © 2024

publish:
  provider: github
  owner: sugarnoir
  repo: threads-manager
  releaseType: release

extraMetadata:
  authMode: "prod"

mac:
  category: public.app-category.social-networking
  icon: assets/icon.icns
  target:
    - dmg

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - dist-electron/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: node_modules/better-sqlite3/build/Release
    to: better-sqlite3/build/Release
    filter:
      - "*.node"
  - from: electron/scripts
    to: scripts
