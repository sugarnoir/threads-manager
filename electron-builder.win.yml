appId: com.threadsmanager.app
productName: ThreadsManager
artifactName: ThreadsManager-${version}-Setup.exe
copyright: Copyright © 2024

publish:
  provider: github
  owner: sugarnoir
  repo: threads-manager
  releaseType: release

extraMetadata:
  authMode: "prod"

win:
  # assets/icon.ico を置けば自動適用される（なければ Electron デフォルトアイコン）
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages: [ja, en]

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - dist-electron/**/*
  - node_modules/**/*
  - package.json

extraResources:
  - from: node_modules/better-sqlite3/build/Release
    to: better-sqlite3/build/Release
    filter:
      - "*.node"
  - from: electron/scripts
    to: scripts
